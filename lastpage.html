<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Menu</title>

<style>

body{
    margin:0;
    height:100vh;
    background:black;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial, sans-serif;
}

/* Button container */

.container{
    text-align:center;
}

/* Buttons */

button{
    display:block;
    width:200px;
    padding:15px;
    margin:15px auto;
    font-size:16px;
    border:none;
    border-radius:8px;
    background:white;
    color:black;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#444;
    color:white;
    transform:scale(1.05);
}

</style>

</head>

<body>

<div class="container">

<button onclick="goPage1()">Apology</button>

<button onclick="goPage2()">Message for hope</button>

<button onclick="goPage3()">Message for goodbye</button>

</div>

<script>

function goPage1(){
    window.location.href="sorry.png";
}

function goPage2(){
    window.location.href="hope.html";
}

function goPage3(){
    window.location.href="goodbye.html";
}

</script>

</body>
</html>
